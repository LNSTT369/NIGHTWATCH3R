name = "valkyrie"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ============================================================================
# Assets (Static files)
# ============================================================================
assets = { directory = "dist/portal", binding = "ASSETS" }

# ============================================================================
# Environment Variables (non-secret)
# ============================================================================
[vars]
ENVIRONMENT = "development"
# Feature flags
FEATURE_LLM_RESEARCH = "true"
FEATURE_OPTIONS = "true"
# Default policy (can be overridden in D1)
DEFAULT_MAX_POSITION_PCT = "0.20"
DEFAULT_MAX_NOTIONAL_PER_TRADE = "10000"
DEFAULT_MAX_DAILY_LOSS_PCT = "0.02"
DEFAULT_COOLDOWN_MINUTES = "30"
DEFAULT_MAX_OPEN_POSITIONS = "10"
DEFAULT_APPROVAL_TTL_SECONDS = "300"

# ============================================================================
# Secrets (set via `wrangler secret put <NAME>`)
# ============================================================================
# ALPACA_API_KEY        - Alpaca API key
# ALPACA_API_SECRET     - Alpaca API secret
# ALPACA_PAPER          - "true" for paper trading (default), "false" for live
# OPENAI_API_KEY        - OpenAI API key (optional, for LLM features)
# GEMINI_API_KEY        - Google Gemini API key (optional, for LLM features)
# OLLAMA_API_KEY        - Ollama API key (optional, for hosted ollama.ai)
# OLLAMA_BASE_URL       - Ollama base URL (optional, default: https://api.ollama.ai/v1)
# LLM_PROVIDER          - Which LLM to use: "openai" | "gemini" | "ollama" (auto-detects if unset)
# KILL_SWITCH_SECRET    - Secret for HMAC signing approval tokens
# GITHUB_TOKEN          - Optional GitHub PAT for higher rate limits

# ============================================================================
# D1 Database
# ============================================================================
[[d1_databases]]
binding = "DB"
database_name = "valkyrie-db"
database_id = "9f8718fd-35ff-4a89-b62c-82571d8c8daf"
migrations_dir = "db/migrations"

# ============================================================================
# KV Namespace (hot cache)
# ============================================================================
[[kv_namespaces]]
binding = "CACHE"
id = "cb1858ee1471473abbb817ac4cbdf262"

# ============================================================================
# R2 Bucket (artifacts storage)
# ============================================================================
# R2 Bucket removed until enabled in dashboard

# ============================================================================
# Durable Objects
# ============================================================================
[[durable_objects.bindings]]
name = "SESSION"
class_name = "SessionDO"

[[durable_objects.bindings]]
name = "RECONCILIATION"
class_name = "ReconciliationDO"

[[durable_objects.bindings]]
name = "MCP_AGENT"
class_name = "ValkyrieMcpAgent"

[[durable_objects.bindings]]
name = "QUANTX_AGENT"
class_name = "QuantxMcpAgent"

[[durable_objects.bindings]]
name = "CODIFY_JOB"
class_name = "CodifyJobDO"

[[durable_objects.bindings]]
name = "SIGNING_DO"
class_name = "SigningDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO", "ValkyrieMcpAgent", "QuantxMcpAgent", "ReconciliationDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CodifyJobDO"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["SigningDO"]

# ============================================================================
# Queues
# ============================================================================
[[queues.producers]]
queue = "codify-jobs"
binding = "CODIFY_QUEUE"

[[queues.consumers]]
queue = "codify-jobs"
max_batch_size = 10
max_batch_timeout = 30

[[queues.producers]]
queue = "mc-jobs"
binding = "MC_QUEUE"

[[queues.consumers]]
queue = "mc-jobs"
max_batch_size = 5
max_batch_timeout = 30

# ============================================================================
# Cron Triggers
# ============================================================================
[triggers]
crons = [
  "*/15 * * * *",      # Agent health check, autonomous hedging, and hourly cache refresh
  "*/5 13-20 * * 1-5", # Event ingestion during market hours
  "30 21 * * 1-5",     # Daily market close cleanup
  "0 5 * * *",         # Midnight reset
  "* * * * 1-5"        # Live Strategy Execution Loop
]

# ============================================================================
# Build Configuration
# ============================================================================
# [build]
# command = "npm run build"

# ============================================================================
# Development Configuration
# ============================================================================
[dev]
port = 8787
local_protocol = "http"

# ============================================================================
# Production Environment
# ============================================================================
[env.production]
name = "valkyrie-production"
assets = { directory = "dist/portal", binding = "ASSETS" }

[env.production.vars]
ENVIRONMENT = "production"
FEATURE_LLM_RESEARCH = "true"
FEATURE_OPTIONS = "false"
DEFAULT_MAX_POSITION_PCT = "0.20"
DEFAULT_MAX_NOTIONAL_PER_TRADE = "10000"
DEFAULT_MAX_DAILY_LOSS_PCT = "0.02"
DEFAULT_COOLDOWN_MINUTES = "60"
DEFAULT_MAX_OPEN_POSITIONS = "10"
DEFAULT_APPROVAL_TTL_SECONDS = "3600"

[[env.production.d1_databases]]
binding = "DB"
database_name = "valkyrie-db"
database_id = "9f8718fd-35ff-4a89-b62c-82571d8c8daf"
migrations_dir = "db/migrations"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "cb1858ee1471473abbb817ac4cbdf262"

# R2 Bucket removed until enabled in dashboard

[env.production.durable_objects]
bindings = [
  { name = "SESSION", class_name = "SessionDO" },
  { name = "RECONCILIATION", class_name = "ReconciliationDO" },
  { name = "MCP_AGENT", class_name = "ValkyrieMcpAgent" },
  { name = "QUANTX_AGENT", class_name = "QuantxMcpAgent" },
  { name = "CODIFY_JOB", class_name = "CodifyJobDO" },
  { name = "SIGNING_DO", class_name = "SigningDO" }
]

[[env.production.queues.producers]]
queue = "codify-jobs"
binding = "CODIFY_QUEUE"

[[env.production.queues.consumers]]
queue = "codify-jobs"
max_batch_size = 10
max_batch_timeout = 30

[[env.production.queues.producers]]
queue = "mc-jobs"
binding = "MC_QUEUE"

[[env.production.queues.consumers]]
queue = "mc-jobs"
max_batch_size = 5
max_batch_timeout = 30
